name: refresh-references

on:
  schedule:
    # Jan / Apr / Jul / Oct 1 at 17:00 UTC — quarterly cadence
    - cron: "0 17 1 1,4,7,10 *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-references
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh reference corpora
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (poppler for pdftotext)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      # Each pull is its own step with its own timeout-minutes cap so a
      # slow upstream (e.g., Cornell LII throttling pull_ucc.py) can't sink
      # the whole job. `continue-on-error: true` lets remaining pulls run
      # if one bails. Per pull_ucc.py's design, the article markdown is
      # only written after all sections are fetched — so a step that times
      # out leaves the existing file untouched rather than half-written.
      #
      # Excluded:
      #   - pull_ca_statutes.py — known regression (leginfo extractor
      #     emits "(empty extraction)" stubs and overwrites curated
      #     cross-reference / overview blocks). Re-enable once fixed.
      #   - OR-specific pullers (pull_oregon_rules.py, pull_oregon_ors.py)
      #     and CO-specific pullers — scripts not yet written; see
      #     CLAUDE.md TODO list.

      - name: WA — court rules (GR 14, CR/CRLJ/ER/RAP, etc.)
        continue-on-error: true
        timeout-minutes: 15
        run: |
          python3 scripts/pull_court_rules.py --workers 12 \
            --manifest plugins/wa-court-docs/skills/wa-law-references/references/court-rules/_manifest.json

      - name: WA — RCW debt chapters
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/pull_wa_rcw.py --workers 12

      - name: CA — court rules (CRC titles + local rules + Rules of Pro. Conduct)
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/pull_ca_court_rules.py --workers 8

      - name: Federal debt laws — WA copy
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/pull_federal_debt_laws.py

      - name: Federal debt laws — OR copy
        continue-on-error: true
        timeout-minutes: 10
        run: |
          python3 scripts/pull_federal_debt_laws.py \
            --out plugins/or-court-docs/skills/or-law-references/references/federal-debt-laws

      - name: Federal debt laws — CA copy
        continue-on-error: true
        timeout-minutes: 10
        run: |
          python3 scripts/pull_federal_debt_laws.py \
            --out plugins/ca-court-docs/skills/ca-law-references/references/federal-debt-laws

      - name: Federal debt laws — CO copy
        continue-on-error: true
        timeout-minutes: 10
        run: |
          python3 scripts/pull_federal_debt_laws.py \
            --out plugins/co-court-docs/skills/co-law-references/references/federal-debt-laws

      - name: Model UCC — WA copy
        continue-on-error: true
        timeout-minutes: 8
        run: python3 scripts/pull_ucc.py --workers 8

      - name: Model UCC — OR copy
        continue-on-error: true
        timeout-minutes: 8
        run: |
          python3 scripts/pull_ucc.py --workers 8 \
            --out plugins/or-court-docs/skills/or-law-references/references/ucc-model

      - name: Model UCC — CA copy
        continue-on-error: true
        timeout-minutes: 8
        run: |
          python3 scripts/pull_ucc.py --workers 8 \
            --out plugins/ca-court-docs/skills/ca-law-references/references/ucc-model

      - name: Model UCC — CO copy
        continue-on-error: true
        timeout-minutes: 8
        run: |
          python3 scripts/pull_ucc.py --workers 8 \
            --out plugins/co-court-docs/skills/co-law-references/references/ucc-model

      - name: Lint after refresh
        run: python3 scripts/lint-skills.py

      # Build the PR body in a file so we never interpolate command
      # output into a `run:` block or into an action `with:` template —
      # avoids any workflow-injection risk and keeps the body readable.
      - name: Build PR body
        run: |
          {
            echo "Automated quarterly refresh of reference corpora."
            echo
            echo "## What ran"
            echo
            echo "- \`pull_court_rules.py\` — WA court rules"
            echo "- \`pull_wa_rcw.py\` — WA RCW chapters"
            echo "- \`pull_ca_court_rules.py\` — CA Rules of Court + local rules"
            echo "- \`pull_federal_debt_laws.py\` — federal law, mirrored into WA / OR / CA / CO"
            echo "- \`pull_ucc.py\` — Model UCC, mirrored into WA / OR / CA / CO"
            echo
            echo "## What did NOT run (known gaps)"
            echo
            echo "- \`pull_ca_statutes.py\` — currently regresses curated content; re-enable once the leginfo extractor is fixed."
            echo "- \`pull_oregon_rules.py\` / \`pull_oregon_ors.py\` — not yet written. OR court-rules and \`or-ors-debt\` corpora stay frozen until pullers exist."
            echo "- \`pull_co_court_rules.py\` / \`pull_co_statutes.py\` — not yet written. CO state-specific corpora stay empty."
            echo
            echo "## Diff summary"
            echo
            echo '```'
            git -c color.ui=never diff --stat \
              -- 'plugins/*/skills/*-law-references/references/**' \
              | tail -200
            echo '```'
            echo
            echo "## Reviewer checklist — @codearranger"
            echo
            echo "- [ ] Confirm the diff is a routine pull (no unexpected file deletions or extractor regressions)."
            echo "- [ ] Decide PATCH vs MINOR version bump for affected \`*-law-references\` SKILL.md per CLAUDE.md \"Reference-corpus refresh discipline\"."
            echo "- [ ] Spot-check one updated rule and one updated statute for verbatim source fidelity before merging."
            echo
            echo "---"
            echo "🤖 Generated by \`.github/workflows/refresh-references.yml\`. Triggers: cron \`0 17 1 1,4,7,10 *\` and manual \`workflow_dispatch\`."
          } > /tmp/pr-body.md

      - name: Open PR with refreshed corpora
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/quarterly-refs-${{ env.RUN_ID }}
          delete-branch: true
          commit-message: |
            chore(refs): quarterly reference-corpus refresh

            Automated refresh of WA + CA reference corpora and shared
            federal / UCC content (mirrored into every plugin).
          title: "chore(refs): quarterly reference-corpus refresh"
          assignees: codearranger
          reviewers: codearranger
          labels: |
            auto-refresh
            references
          body-path: /tmp/pr-body.md
