name: refresh-references

on:
  schedule:
    # Jan / Apr / Jul / Oct 1 at 17:00 UTC — quarterly cadence.
    # Cron fires the workflow with target="all" so every leg of the
    # matrix runs in parallel.
    - cron: "0 17 1 1,4,7,10 *"
  workflow_dispatch:
    inputs:
      target:
        description: "Which plugin's references to refresh"
        type: choice
        required: true
        default: all
        options:
          - all
          - federal
          - immigration
          - wa
          - or
          - ca
          - co
          - in
          - ny
          - oh
          - tn
          - mi
          - az
          - ar

permissions:
  contents: write
  pull-requests: write

concurrency:
  # One run per (workflow, target) so a manual single-target run doesn't
  # cancel an in-flight cron-all run already running other legs.
  group: refresh-references-${{ github.event.inputs.target || 'all' }}
  cancel-in-progress: false

env:
  PR_REVIEWER: codearranger

jobs:
  pick-targets:
    name: Pick targets to refresh
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.pick.outputs.targets }}
    steps:
      - id: pick
        env:
          TARGET: ${{ github.event.inputs.target }}
        run: |
          case "${TARGET:-all}" in
            all)     targets='["federal","immigration","wa","or","ca","co","in","ny","oh","tn","mi","az","ar"]' ;;
            federal) targets='["federal"]' ;;
            immigration) targets='["immigration"]' ;;
            wa)      targets='["wa"]' ;;
            or)      targets='["or"]' ;;
            ca)      targets='["ca"]' ;;
            co)      targets='["co"]' ;;
            in)      targets='["in"]' ;;
            ny)      targets='["ny"]' ;;
            oh)      targets='["oh"]' ;;
            tn)      targets='["tn"]' ;;
            mi)      targets='["mi"]' ;;
            az)      targets='["az"]' ;;
            ar)      targets='["ar"]' ;;
            *)       echo "unexpected target: $TARGET" >&2; exit 1 ;;
          esac
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  refresh:
    name: Refresh ${{ matrix.target }} references
    needs: pick-targets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.pick-targets.outputs.targets) }}
    env:
      TARGET: ${{ matrix.target }}
      RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (poppler for pdftotext)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      # Each pull is its own step with a `timeout-minutes` cap so a
      # slow upstream (e.g. law.cornell.edu/ucc throttling pull_ucc.py)
      # can't sink the whole leg. `continue-on-error: true` lets the
      # rest of the leg's pulls run if one bails. The puller scripts
      # only write output after a unit fully completes, so a timed-out
      # step leaves the existing files untouched.
      #
      # Excluded everywhere:
      #   - pull_ca_statutes.py — known content regression
      #   - pull_co_court_rules.py — TODO (CO court-rules puller not yet implemented)

      # ---- federal — shared corpus consumed by every state plugin ----
      - name: Federal — debt laws
        if: matrix.target == 'federal'
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/pull_federal_debt_laws.py

      - name: Federal — Model UCC
        if: matrix.target == 'federal'
        continue-on-error: true
        # 15 min cap: the new throttle-aware defaults in pull_ucc.py use
        # workers=2, jittered backoff, and a 30s cool-off between articles
        # to stay under Cornell LII's rate limit. Total wall time when
        # things go well is 3-5 min; budget covers a couple of retry cycles.
        timeout-minutes: 15
        run: python3 scripts/pull_ucc.py

      # ---- immigration — shared, venue-independent corpus ----
      # INA (8 U.S.C. ch 12) from uscode.house.gov USLM XML and the
      # curated 8 CFR / 22 CFR parts from the eCFR versioner API both
      # come from official, un-gated government endpoints. The FAM puller
      # mirrors verbatim: fam.state.gov omits the Sectigo intermediate from
      # its TLS chain, so the puller AIA-chases it (reads the leaf's AIA
      # "CA Issuers" URL, fetches the intermediate, adds it to the verify
      # bundle) and then crawls the site's JSON TOC API — no proxy needed.
      # `continue-on-error` + the `_file_is_stub` guard mean that if a runner
      # genuinely can't reach fam.state.gov the step preserves the committed
      # verbatim content rather than clobbering it. Case law is not pulled
      # here — it is on-demand per references/legal-data-apis.md.
      - name: Immigration — INA (8 U.S.C. Chapter 12)
        if: matrix.target == 'immigration'
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/pull_ina.py

      - name: Immigration — 8 CFR + 22 CFR (curated parts)
        if: matrix.target == 'immigration'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_immigration_cfr.py

      - name: Immigration — FAM (verbatim; AIA-chases the omitted TLS intermediate + crawls the JSON TOC API)
        if: matrix.target == 'immigration'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_fam.py

      # EOIR practice manuals (ICPM + BIA Practice Manual). EOIR renders these
      # client-side (JavaScript) and Akamai-gates the chapter URLs, so the
      # puller writes canonical-URL pointer stubs (the binding rules are the
      # 8 CFR Part 1003/1240/1208 regs pulled by pull_immigration_cfr.py).
      # The _file_is_stub guard preserves any verbatim content a future
      # headless/un-gated run commits.
      - name: Immigration — EOIR practice manuals (ICPM + BIA Practice Manual stubs)
        if: matrix.target == 'immigration'
        continue-on-error: true
        timeout-minutes: 5
        run: python3 scripts/pull_eoir_manuals.py

      # ---- WA ----
      - name: WA — court rules
        if: matrix.target == 'wa'
        continue-on-error: true
        timeout-minutes: 15
        run: |
          python3 scripts/pull_court_rules.py --workers 12 \
            --manifest plugins/wa-court-docs/skills/wa-law-references/references/court-rules/_manifest.json

      - name: WA — RCW debt chapters
        if: matrix.target == 'wa'
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/pull_wa_rcw.py --workers 12

      # ---- OR ----
      # Federal + UCC content for OR comes from the shared `federal`
      # target. The OR-specific pullers below refresh the Oregon-only
      # corpora (ORS chapters and the seven OR court-rule canonical
      # sources).
      - name: OR — court rules
        if: matrix.target == 'or'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_oregon_rules.py

      - name: OR — ORS debt + civil-practice chapters
        if: matrix.target == 'or'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_oregon_ors.py --workers 4

      # ---- CA ----
      - name: CA — court rules
        if: matrix.target == 'ca'
        continue-on-error: true
        timeout-minutes: 10
        run: python3 scripts/pull_ca_court_rules.py --workers 8

      # ---- CO ----
      - name: CO — statute corpus (titles 4, 5, 6, 13, 14, 24)
        if: matrix.target == 'co'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_co_statutes.py --workers 4

      - name: CO — court rules (Chief Justice Directives + paywalled-rule stubs)
        if: matrix.target == 'co'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_co_court_rules.py --workers 4

      # ---- IN ----
      # Indiana's five state-wide rule sets (Trial, Evidence, Appellate,
      # Professional Conduct, Administrative) plus Marion County and Lake
      # County local-rule PDFs all come from rules.incourts.gov and
      # in.gov/courts/files. The statute puller targets the IGA Hypermedia
      # API at api.iga.in.gov; when the `IGA_API_KEY` secret is unset (the
      # current state) the script emits well-formed stubs so the corpus
      # mirrors the article shape until access is wired in.
      - name: IN — court rules (state-wide + Marion/Lake local rules)
        if: matrix.target == 'in'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_indiana_rules.py --workers 4

      - name: IN — Indiana Code (civil-practice articles)
        if: matrix.target == 'in'
        continue-on-error: true
        timeout-minutes: 15
        env:
          IGA_API_KEY: ${{ secrets.IGA_API_KEY }}
        run: python3 scripts/pull_indiana_statutes.py --workers 4

      # ---- NY ----
      # New York's trial-court rules (22 NYCRR Parts 130, 202, 202.70,
      # 208, 210, 212, 214, 1200) are published on www.nycourts.gov,
      # which sits behind Cloudflare's managed-challenge gate. The
      # court-rules puller tries the canonical URLs first and falls
      # back to pointer stubs when the upstream returns an
      # interstitial — mirrors the CO court-rules puller's discipline.
      # The statutes puller hits the NY State Senate Open Legislation
      # API at legislation.nysenate.gov; when the `NYSENATE_API_KEY`
      # secret is unset (the current state) the script emits well-
      # formed pointer stubs so the corpus retains its target shape
      # until access is wired in. Mirrors the IN statutes puller.
      - name: NY — court rules (22 NYCRR civil practice + Comm Div + sanctions)
        if: matrix.target == 'ny'
        continue-on-error: true
        timeout-minutes: 15
        # No `NY_RULES_PROXY` here on purpose. The proxy referenced
        # by that env var is a developer-local Cloudflare-Warp HTTP
        # endpoint (on a LAN address); GitHub Actions runners can't
        # reach it. The puller falls back to stubs when Cloudflare
        # blocks the runner — but the per-file "don't regress
        # substantive content to a stub" check (`_file_is_stub`)
        # keeps any verbatim content already committed to the repo
        # in place. So the worst case for a CI refresh is a `Fetched:`
        # date bump with no real change. Operators wanting a fresh
        # verbatim pull should run the puller locally with their
        # `NY_RULES_PROXY` set.
        run: |
          pip3 install --break-system-packages curl_cffi
          python3 scripts/pull_ny_court_rules.py --workers 4

      - name: NY — consolidated laws (CPLR + GOB + GBS + RPAPL + UCC + DRL + GCN + BNK)
        if: matrix.target == 'ny'
        continue-on-error: true
        timeout-minutes: 15
        env:
          NYSENATE_API_KEY: ${{ secrets.NYSENATE_API_KEY }}
        run: python3 scripts/pull_ny_statutes.py --workers 4

      # ---- OH ----
      # Ohio's court rules + statutes are both published on
      # public-access government sites with no Cloudflare gate
      # and no API-key requirement:
      #   - Supreme Court of Ohio (`supremecourt.ohio.gov`)
      #     publishes 14 rule-of-court PDFs at predictable URLs;
      #     pdftotext extracts them. Civ. R. + Evid. R. + Sup. R.
      #     + Prof. Cond. R. etc.
      #   - Ohio Legislative Service Commission (`codes.ohio.gov`)
      #     publishes the Revised Code as HTML chapter pages with
      #     section bodies inline. The puller fetches 20 chapters
      #     (R.C. Chapter 1 + 1302/1303/1309 UCC + 1345 CSPA +
      #     2151/2305/2329/2333 civil enforcement + 3105/3109/3113/
      #     3115/3119/3127 family + 5321/1923 L&T + 1901/1907/1925
      #     court-specific procedural).
      - name: OH — court rules (Civ. R. + Evid. R. + Sup. R. + Prof. Cond. R. + 10 others)
        if: matrix.target == 'oh'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_ohio_court_rules.py --workers 3

      - name: OH — Revised Code (20 chapters covering civil + family practice)
        if: matrix.target == 'oh'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_ohio_statutes.py --workers 4

      # ---- TN ----
      # Tennessee's statewide rule sets are published as Drupal HTML
      # at tncourts.gov — one HTML sub-page per rule, with the rule
      # body inside a `field--name-field-rules-rule-content` div.
      # The court-rules puller walks each rule set's landing page,
      # discovers sub-page URLs by path prefix, and aggregates one
      # MD file per rule set.
      #
      # The Tennessee Code is published officially by LexisNexis
      # under copyright (no clean structured free authoritative
      # source). The statute puller targets the Justia mirror at
      # `law.justia.com/codes/tennessee/`. Justia sits behind
      # Cloudflare bot-fight mode that fingerprints the TLS
      # handshake; stdlib urllib gets a 403 even from a residential
      # IP. The puller uses `curl_cffi` with Chrome TLS
      # impersonation when available — installed below before the
      # statutes step. GitHub Actions runner IPs occasionally pass
      # Cloudflare's IP-reputation check and occasionally don't; the
      # step is `continue-on-error: true` and the puller falls back
      # to well-formed pointer stubs when fetch fails. The
      # `_file_is_stub` regression guard keeps any verbatim content
      # already committed in place — so the worst case for a CI
      # refresh is a `Fetched:` date bump with no real change.
      # Operators wanting a guaranteed-fresh verbatim pull should
      # run the puller locally from a residential or VPN-routed IP.
      - name: TN — court rules (TRCP + TRE + TRAP + Tenn. Sup. Ct. R.)
        if: matrix.target == 'tn'
        continue-on-error: true
        timeout-minutes: 20
        run: python3 scripts/pull_tn_court_rules.py --workers 2

      - name: TN — Tenn. Code Ann. (25 chapters covering civil + family practice)
        if: matrix.target == 'tn'
        continue-on-error: true
        timeout-minutes: 20
        run: |
          pip3 install --break-system-packages curl_cffi
          python3 scripts/pull_tn_statutes.py --workers 4

      # ---- MI ----
      # Michigan Compiled Laws come from legislature.mi.gov (ungated HTML; the
      # objectName per-section scheme), so the statutes puller mirrors verbatim.
      # The Michigan Court Rules / Rules of Evidence are gated on the canonical
      # courts.michigan.gov (hash-rotated asset URLs), so the rules puller mirrors
      # them verbatim from courtrules.net (walking chapter -> subchapter -> rule),
      # falling back to canonical-URL pointer stubs only when that mirror is
      # unreachable; the _file_is_stub guard preserves committed verbatim content.
      - name: MI — Michigan Compiled Laws (curated civil + family + consumer sections)
        if: matrix.target == 'mi'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_michigan_statutes.py

      - name: MI — Michigan Court Rules + Rules of Evidence (verbatim where reachable, else stubs)
        if: matrix.target == 'mi'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_michigan_rules.py

      # ---- AZ ----
      # Arizona Revised Statutes come from azleg.gov (ungated per-section HTML
      # fragments), so the statutes puller mirrors verbatim. The Arizona court
      # rules (Ariz. R. Civ. P., Ariz. R. Evid., Arizona Rules of Family Law
      # Procedure, Justice Court Rules) are gated on the canonical azcourts.gov,
      # so the rules puller mirrors them verbatim from the courtrules.net mirror
      # (walking its index → rule pages), falling back to canonical-URL pointer
      # stubs only when the mirror is unreachable; the _file_is_stub guard
      # preserves committed verbatim content.
      - name: AZ — Arizona Revised Statutes (curated civil + family + consumer sections)
        if: matrix.target == 'az'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_arizona_statutes.py

      - name: AZ — Arizona court rules (Ariz. R. Civ. P. + Evid. + Family Law Proc. + Justice Court)
        if: matrix.target == 'az'
        continue-on-error: true
        timeout-minutes: 15
        run: python3 scripts/pull_arizona_rules.py

      # ---- AR ----
      # Arkansas Code Annotated section text is public domain (LexisNexis
      # publishes the official ANNOTATED code under copyright). The statutes
      # puller mirrors the bare section text from the Justia mirror at
      # law.justia.com/codes/arkansas/, discovering section URLs by walking
      # Title -> Subtitle -> Chapter -> Subchapter -> Section links (Arkansas
      # nests a subtitle/subchapter layer, so the puller does not construct
      # URLs). Justia sits behind Cloudflare bot-fight mode that 403s
      # *intermittently* even against curl_cffi's Chrome TLS fingerprint, so
      # a 403 is treated as retryable; the puller falls back to pointer
      # stubs only after the retry budget is exhausted.
      #
      # The Arkansas court rules (Ark. R. Civ. P., Ark. R. Evid., Arkansas
      # District Court Rules, Supreme Court/Court of Appeals Rules) are
      # published VERBATIM by the Arkansas Judiciary as PDFs on its Lexum
      # database at opinions.arcourts.gov/ark/cr/en/<docid>/1/document.do.
      # The rules puller discovers the current document id per rule set by
      # title, downloads the PDF, and extracts text with `pdftotext -layout`
      # (poppler-utils installed below), with canonical-URL pointer-stub
      # fallback. The _file_is_stub guard on both pullers preserves committed
      # verbatim content.
      - name: AR — Arkansas Code Annotated (verbatim civil + family + consumer chapters)
        if: matrix.target == 'ar'
        continue-on-error: true
        timeout-minutes: 30
        run: |
          pip3 install --break-system-packages curl_cffi
          python3 scripts/pull_arkansas_statutes.py --workers 3

      - name: AR — Arkansas court rules (Ark. R. Civ. P. + Evid. + District Court + Sup. Ct./Ct. App.)
        if: matrix.target == 'ar'
        continue-on-error: true
        timeout-minutes: 15
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils
          python3 scripts/pull_arkansas_rules.py

      # ---- Finalize ----

      - name: Lint after refresh
        run: python3 scripts/lint-skills.py

      - name: Compute diff scope
        id: scope
        env:
          T: ${{ matrix.target }}
        run: |
          case "$T" in
            federal)     path='plugins/claude-legal-federal-laws/references/**' ;;
            immigration) path='plugins/claude-legal-immigration-laws/references/**' ;;
            *)           path="plugins/${T}-court-docs/skills/${T}-law-references/references/**" ;;
          esac
          echo "path=$path" >> "$GITHUB_OUTPUT"

      # PR body built into /tmp/pr-body.md so command output (git diff)
      # never lands in a template / shell-eval context — no injection
      # surface from file names or paths.
      - name: Build PR body
        env:
          DIFF_PATH: ${{ steps.scope.outputs.path }}
        run: |
          {
            echo "Automated refresh of **\`${TARGET}\`** references."
            echo
            echo "Triggered by: \`${{ github.event_name }}\`"
            echo
            echo "## Diff summary"
            echo
            echo '```'
            git -c color.ui=never diff --stat -- "$DIFF_PATH" | tail -200
            echo '```'
            echo
            echo "## Reviewer checklist — @${PR_REVIEWER}"
            echo
            echo "- [ ] Diff is a routine pull (no unexpected deletions or extractor regressions)."
            echo "- [ ] Decide PATCH vs MINOR version bump for affected SKILL.md / plugin.json per CLAUDE.md \"Reference-corpus refresh discipline\"."
            echo "- [ ] Spot-check one updated rule or statute for verbatim source fidelity before merging."
            echo
            echo "---"
            echo "🤖 Generated by \`.github/workflows/refresh-references.yml\`. Triggers: cron \`0 17 1 1,4,7,10 *\` (all targets) and manual \`workflow_dispatch\` (per-target selector)."
          } > /tmp/pr-body.md

      - name: Open PR for ${{ matrix.target }} refresh
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/refresh-${{ matrix.target }}-${{ env.RUN_ID }}
          delete-branch: true
          commit-message: |
            chore(refs): refresh ${{ matrix.target }} reference corpora

            Automated refresh of ${{ matrix.target }} content via the
            quarterly refresh-references workflow.
          title: "chore(refs): refresh ${{ matrix.target }} reference corpora"
          assignees: ${{ env.PR_REVIEWER }}
          reviewers: ${{ env.PR_REVIEWER }}
          labels: |
            auto-refresh
            references
            target:${{ matrix.target }}
          body-path: /tmp/pr-body.md
